version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: expertisestation-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8080
    env_file:
      - src/server/.env
    volumes:
      - ./src/uploads:/app/uploads
    networks:
      - app-network
    depends_on:
      - db
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    user: "1001:1001"

  nginx:
    image: nginx:alpine
    container_name: expertisestation-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/ssl/certs:ro
    networks:
      - app-network
    depends_on:
      - api
    security_opt:
      - no-new-privileges:true

  db:
    image: mysql:8.0
    container_name: expertisestation-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - app-network
    security_opt:
      - no-new-privileges:true
    command: --default-authentication-plugin=mysql_native_password

volumes:
  db_data:

networks:
  app-network:
    driver: bridge